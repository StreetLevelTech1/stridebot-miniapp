const API_BASE = (typeof STRIDEBOT_API !== 'undefined') ? STRIDEBOT_API : 'https://stridebot.onrender.com';

async function fetchPrices() {
  if (!API_BASE) return;
  try {
    const res = await fetch(API_BASE + '/api/prices');
    const data = await res.json();
    if (!data.ok) return;
    const p = data.prices;
    S.prices = {...S.prices, ...Object.fromEntries(Object.entries(p).map(([k,v])=>[k,v.price]))};
    if (p.BTC) {
      document.getElementById('m-btc').textContent = '$' + Math.round(p.BTC.price).toLocaleString();
      document.getElementById('m-btc-c').textContent = (p.BTC.change >= 0 ? '+' : '') + p.BTC.change + '%';
      document.getElementById('m-btc-c').className = 'pchg ' + (p.BTC.change >= 0 ? 'up' : 'dn');
    }
    if (p.ETH) {
      document.getElementById('m-eth').textContent = '$' + Math.round(p.ETH.price).toLocaleString();
      document.getElementById('m-eth-c').textContent = (p.ETH.change >= 0 ? '+' : '') + p.ETH.change + '%';
      document.getElementById('m-eth-c').className = 'pchg ' + (p.ETH.change >= 0 ? 'up' : 'dn');
    }
    if (p.SOL) {
      document.getElementById('m-sol').textContent = '$' + p.SOL.price.toFixed(2);
      document.getElementById('m-sol-c').textContent = (p.SOL.change >= 0 ? '+' : '') + p.SOL.change + '%';
      document.getElementById('m-sol-c').className = 'pchg ' + (p.SOL.change >= 0 ? 'up' : 'dn');
    }
    if (p.BTC) { document.getElementById('cp-btc').textContent = '$' + Math.round(p.BTC.price).toLocaleString(); }
    if (p.TON) { document.getElementById('cp-ton').textContent = '$' + p.TON.price.toFixed(2); }
    if (p.SOL) { document.getElementById('cp-sol').textContent = '$' + p.SOL.price.toFixed(2); }
    if (p.BTC) { document.getElementById('pred-p').textContent = '$' + Math.round(p.BTC.price).toLocaleString(); }
  } catch(e) { /* silent fallback to mock data */ }
}
